<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Uros de Rivas</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect hack
    // When GH Pages serves a 404 for an SPA route like /UrosDeRivas/market?success=true,
    // this script preserves the path+query and redirects to index.html which loads the React app.
    var pathSegmentsToKeep = 1; // Keep /UrosDeRivas/ as the base
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
